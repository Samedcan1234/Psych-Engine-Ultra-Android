name: Main

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # v1.0, v2.0.1-beta gibi tag pushlandığında tetiklenir

jobs:
  Build:
    strategy:
      matrix:
        include:
          - name: Windows
            os: windows-2022
            buildArgs: windows
            setupCommand: .\"setup/windows.bat"
            artifactName: windowsBuild-x86_64
            artifactPath: export\release\windows\bin\*
          - name: Linux
            os: ubuntu-22.04
            buildArgs: linux
            setupCommand: sh ./setup/unix.sh
            artifactName: linuxBuild-x86_64
            artifactPath: export/release/linux/bin/*
          - name: macOS x86_64
            os: macos-15
            setupCommand: sh ./setup/unix.sh
            buildArgs: "mac -64 -D HXCPP_M64"
            artifactName: macOSBuild-x86_64
            artifactPath: export/release/macos/bin/*
          - name: macOS ARM64
            os: macos-15
            setupCommand: sh ./setup/unix.sh
            buildArgs: "mac -arm64 -D HXCPP_ARM64"
            artifactName: macOSBuild-arm64
            artifactPath: export/release/macos/bin/*
          - name: Android
            os: macos-15
            buildArgs: "android -ONLY_ARMV7"
            setupCommand: sh ./setup/unix.sh
            artifactName: androidBuild
            artifactPath: "export/release/android/bin/app/build/outputs/apk/release/*.apk"
          - name: iOS
            os: macos-15
            buildArgs: "ios -nosign"
            setupCommand: sh ./setup/unix.sh
            artifactName: iOSBuild
            artifactPath: "export/release/ios/build/Release-iphoneos/*.ipa"
    uses: ./.github/workflows/build.yml
    with:
      name: ${{ matrix.name }}
      os: ${{ matrix.os }}
      buildArgs: ${{ matrix.buildArgs }}
      setupCommand: ${{ matrix.setupCommand }}
      artifactName: ${{ matrix.artifactName }}
      artifactPath: ${{ matrix.artifactPath }}

  # --- YENİ EKLENEN RELEASE BÖLÜMÜ ---
  Releaser:
    needs: Build
    if: startsWith(github.ref, 'refs/tags/') # Sadece bir tag pushlandığında çalışır
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release oluşturabilmek için yazma izni şart
    steps:
      - name: 📥 Tüm Buildleri İndir
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 🚀 GitHub Release Oluştur ve Dosyaları Ekle
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Artifact'lar alt klasörlere indiği için wildcards kullanıyoruz
          files: |
            ./artifacts/windowsBuild-x86_64/**/*
            ./artifacts/linuxBuild-x86_64/**/*
            ./artifacts/macOSBuild-x86_64/**/*
            ./artifacts/macOSBuild-arm64/**/*
            ./artifacts/androidBuild/**/*
            ./artifacts/iOSBuild/**/*