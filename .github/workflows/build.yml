name: Build

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      setupCommand:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string

env:
  HAXE_VERSION: 4.3.6
  PROJECT_NAME: PsychEngine

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4

      # Haxe
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      # Cache haxelib
      - name: Cache haxelib
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: haxelib-${{ runner.os }}-${{ env.HAXE_VERSION }}-${{ hashFiles('setup/unix.sh') }}

      # Cache lime build
      - name: Cache lime
        uses: actions/cache@v4
        with:
          path: |
            ~/.lime
            export/release/android/haxe
            export/release/android/obj
          key: lime-${{ runner.os }}-${{ hashFiles('source/**/*.hx','Project.xml') }}

      # Android NDK
      - name: Setup Android NDK
        if: inputs.name == 'Android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      # Java
      - name: Setup Java
        if: inputs.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # hxcpp config (PCH fix)
      - name: Configure hxcpp
        if: inputs.name == 'Android'
        run: |
          mkdir -p ~/.hxcpp
          cat > ~/.hxcpp/config.json << EOF
          {
            "HXCPP_COMPILE_THREADS": "4",
            "HXCPP_DISABLE_PCH": "1"
          }
          EOF

      # Install libs
      - name: Install Libraries
        run: ${{ inputs.setupCommand }}

      # Android config
      - name: Configure Android
        if: inputs.name == 'Android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_ROOT
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      # hxcpp rebuild
      - name: Rebuild hxcpp
        run: |
          haxelib run lime rebuild hxcpp

      # Compile
      - name: Compile
        run: |
          haxelib run lime build ${{ inputs.buildArgs }}

      # Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}