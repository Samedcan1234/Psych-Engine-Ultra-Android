name: Build
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      setupCommand:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string
env:
  HAXE_VERSION: 4.3.6
  PROJECT_NAME: PsychEngine
jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Cache Haxelib
        id: cache-haxelib
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: haxelib-${{ inputs.name }}-${{ env.HAXE_VERSION }}-${{ hashFiles('setup/unix.sh') }}
          restore-keys: |
            haxelib-${{ inputs.name }}-${{ env.HAXE_VERSION }}-

      - name: Cache Lime
        uses: actions/cache@v4
        with:
          path: |
            ~/.lime
            export/release/android/haxe
            export/release/android/obj
            export/release/ios/haxe
            export/release/ios/obj
          key: lime-${{ inputs.name }}-${{ hashFiles('source/**/*.hx', 'Project.xml') }}
          restore-keys: |
            lime-${{ inputs.name }}-

      - name: Cache Android NDK
        if: inputs.name == 'Android'
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/ndk/r21e
          key: ndk-r21e

      - name: Setup Android NDK
        if: inputs.name == 'Android' && steps.cache-ndk.outputs.cache-hit != 'true'
        id: setup-ndk
        uses: nttld/setup-ndk@main
        with:
          ndk-version: r21e
          add-to-path: false

      - name: Restore NDK Path
        if: inputs.name == 'Android'
        id: restore-ndk
        run: |
          if [ "${{ steps.cache-ndk.outputs.cache-hit }}" == "true" ]; then
            echo "ndk-path=${{ runner.tool_cache }}/ndk/r21e" >> $GITHUB_OUTPUT
          else
            echo "ndk-path=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_OUTPUT
          fi

      - name: Install libVLC (Linux)
        if: contains(inputs.name, 'Linux')
        run: sudo apt install libvlc-dev libvlccore-dev

      - name: Cache VLCKit (iOS)
        if: inputs.name == 'iOS'
        id: cache-vlckit
        uses: actions/cache@v4
        with:
          path: ~/vlc-ios
          key: vlckit-3.6.0

      - name: Download VLCKit (iOS)
        if: inputs.name == 'iOS' && steps.cache-vlckit.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/vlc-ios
          cd ~/vlc-ios
          curl -L --retry 3 -o MobileVLCKit.zip \
            "https://download.videolan.org/cocoapods/unstable/MobileVLCKit-3.6.0b8.zip" \
            || curl -L --retry 3 -o MobileVLCKit.zip \
            "https://download.videolan.org/cocoapods/unstable/MobileVLCKit-3.5.1.zip" \
            || curl -L --retry 3 -o MobileVLCKit.zip \
            "https://download.videolan.org/pub/cocoapods/prod/MobileVLCKit-3.3.11a.zip"
          unzip -q MobileVLCKit.zip || true
          ls -la

      - name: Configure VLCKit for iOS
        if: inputs.name == 'iOS'
        run: |
          echo "VLC_IOS_PATH=$HOME/vlc-ios" >> $GITHUB_ENV
          haxelib run lime config VLC_IOS_FRAMEWORK $HOME/vlc-ios || true

      - name: Verify hxvlc Android Support
        if: inputs.name == 'Android'
        run: |
          echo "hxvlc Android: NDK üzerinden native build yapılacak"
          haxelib list | grep hxvlc || echo "hxvlc henüz kurulmadı, setup'ta kurulacak"

      - name: Install Libraries
        if: steps.cache-haxelib.outputs.cache-hit != 'true'
        run: ${{ inputs.setupCommand }}

      - name: Setup Haxelib Path
        if: steps.cache-haxelib.outputs.cache-hit == 'true'
        run: haxelib setup ~/haxelib

      - name: Setup Java (Android)
        if: inputs.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Fix hxcpp PCH (Android/Ubuntu)
        if: inputs.name == 'Android'
        run: |
          echo "HXCPP_DISABLE_PCH=1" >> $GITHUB_ENV
          echo "HXCPP_COMPILE_THREADS=4" >> $GITHUB_ENV

      - name: Configure Android
        if: inputs.name == 'Android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.restore-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: haxelib run lime build ${{ inputs.buildArgs }}

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          brew install ldid
          cd export/release/ios/build/Release-iphoneos/${{ env.PROJECT_NAME }}.app
          ldid -S../../../${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.entitlements ${{ env.PROJECT_NAME }}
          cd ..
          mkdir Payload
          mv ${{ env.PROJECT_NAME }}.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error